<body><main class="app"><div class="top"><div class="title">Serafidraco DMG</div><div><button id="sound">🔊 Sonido</button><button id="reset">Reiniciar</button></div></div><section class="sec"><div class="card"><div class="art"><img id="hero"></div><div class="meta"><div class="name" id="nm"></div><div class="desc" id="ds"></div></div></div></section><section class="sec"><div class="gameTitle">Escenario pixel art <button class="cry" id="cry">Escuchar grito</button></div><div class="canvasWrap"><canvas id="cv" width="416" height="240"></canvas><div class="flash" id="flash"></div></div><div class="hud"><div class="box"><small>Fase</small><b id="fase">1/8</b></div><div class="box"><small>Esencia</small><b id="ess">0</b></div><div class="box"><small>Vivo</small><b id="alive">0m</b></div><div class="box"><small>Siguiente</small><b id="next">220</b></div></div></section><section class="sec"><div id="stats"></div><div class="xp"><div class="xpTop"><span id="xpStage">Fase 1/8</span><span id="xpText">0</span></div><div class="xpbar"><div class="xpfill" id="xpFill"></div></div></div><div class="actions"><button id="feed">Alimentar</button><button id="care">Cuidar</button><button id="play">Entretener</button><button id="rest">Descansar</button><button id="bless">Bendecir</button><button id="heal">Curación</button></div><div class="log" id="log">Toca la pantalla para activar audio. Las evoluciones futuras están ocultas hasta desbloquearlas.</div><div class="evos" id="evos"></div></section></main><div class="overlay" id="dead"><div class="modal"><h2>Tu criatura murió</h2><p id="why"></p><button id="new">Crear nueva criatura</button></div></div>
<script>
const EV=[['Huevo Primordial',0,'Un huevo ancestral que vibra con luz sagrada.'],['Cría Estelar',220,'Una cría curiosa y frágil.'],['Brote Celeste',520,'Explora el mundo y juega con su magia.'],['Drake Adolescente',980,'Orgullo, energía y alas incipientes.'],['Draco Aurelio',1650,'Forma joven y noble.'],['Draco Serafín',2580,'Adulto, poderoso y sereno.'],['Heraldo Empíreo',3780,'Su esencia roza lo divino.'],['Serafidraco Divino',5300,'Bestia-ángel luminosa y sagrada.']].map((e,i)=>({name:e[0],at:e[1],desc:e[2],img:`stage_${i+1}.b64`}));
const K='serafidraco_dmg_state_v3',DEF={h:78,c:75,f:74,xp:0,born:Date.now(),tick:Date.now(),dead:false,sound:true,bu:0,hu:0};let S=load(),AC=null,ready=false,step=0,stage=0;const $=id=>document.getElementById(id),cl=(n,a,b)=>Math.max(a,Math.min(b,n));function load(){try{return{...DEF,...JSON.parse(localStorage[K]||'{}')}}catch{return{...DEF}}}function save(){localStorage[K]=JSON.stringify(S)}async function assets(){await Promise.all(EV.map(async e=>{const r=await fetch(e.img,{cache:'force-cache'});e.img='data:image/webp;base64,'+(await r.text()).trim()}))}
function st(){let i=0;EV.forEach((e,n)=>{if(S.xp>=e.at)i=n});return i}function nxt(){return EV[st()+1]}function log(t){$('log').textContent=t}function flash(t){let f=$('flash');f.textContent=t;f.classList.add('show');clearTimeout(f.t);f.t=setTimeout(()=>f.classList.remove('show'),1000)}function die(t){if(S.dead)return;S.dead=true;$('why').textContent=t;$('dead').classList.add('show');snd('death');save()}function check(){if(S.h<=0)die('Murió de hambre.');else if(S.c<=0)die('Murió por descuido.');else if(S.f<=0)die('Su ánimo llegó a 0.')}function decay(){if(S.dead)return;let n=Math.floor((Date.now()-S.tick)/8000);if(n<=0)return;for(let i=0;i<n;i++){let q=st();S.h=cl(S.h-(1.75+q*.16),0,100);S.c=cl(S.c-(1.4+q*.14),0,100);S.f=cl(S.f-(1.55+q*.15),0,100);check();if(S.dead)break}S.tick+=n*8000}
function mult(){let avg=(S.h+S.c+S.f)/3,spread=Math.max(S.h,S.c,S.f)-Math.min(S.h,S.c,S.f);let m=avg>=80?1.7:avg>=68?1.25:avg>=55?.95:avg>=42?.72:.4;if(spread<=12)m+=.3;else if(spread<=22)m+=.14;return m}function xp(n,msg){let b=st(),g=Math.max(1,Math.round(n*mult()));S.xp+=g;let a=st();if(a>b){log('✨ Evolucionó a '+EV[a].name+' (+'+g+' esencia).');flash('¡Evolución!');jingle(a)}else log(msg+' +'+g+' esencia.')}function act(t){unlock();decay();if(S.dead)return render();if(t=='feed'){S.h=cl(S.h+18,0,100);S.f=cl(S.f-3,0,100);xp(12,'🍎 Comió bien.');snd('feed')}if(t=='care'){S.c=cl(S.c+19,0,100);S.h=cl(S.h-2,0,100);xp(11,'🧼 Recibió cuidados.');snd('care')}if(t=='play'){S.f=cl(S.f+21,0,100);S.h=cl(S.h-7,0,100);S.c=cl(S.c-4,0,100);xp(13,'🎾 Se entretuvo.');snd('play')}if(t=='rest'){S.c=cl(S.c+8,0,100);S.f=cl(S.f+5,0,100);S.h=cl(S.h-6,0,100);xp(6,'😴 Descansó.');snd('rest')}if(t=='bless'){if(Date.now()<S.bu)return log('🌟 Bendición recargando.');S.h=cl(S.h+10,0,100);S.c=cl(S.c+10,0,100);S.f=cl(S.f+10,0,100);S.bu=Date.now()+240000;xp(15,'🌟 Bendición.');snd('bless')}if(t=='heal'){if(Date.now()<S.hu)return log('🩹 Curación recargando.');S.h=cl(S.h+16,0,100);S.c=cl(S.c+16,0,100);S.f=cl(S.f+16,0,100);S.hu=Date.now()+420000;xp(5,'🩹 Curación.');snd('heal')}check();S.tick=Date.now();render()}
let waves={};function unlock(){if(ready)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();ready=true;bgm()}catch{}}function pw(d){if(waves[d])return waves[d];let R=new Float32Array(32),I=new Float32Array(32);for(let n=1;n<32;n++)I[n]=(2/(n*Math.PI))*Math.sin(n*Math.PI*d);return waves[d]=AC.createPeriodicWave(R,I)}function env(g,t,d,v){g.gain.setValueAtTime(.0001,t);g.gain.setValueAtTime(Math.round(v*15)/15,t+.01);for(let i=1;i<5;i++)g.gain.setValueAtTime(Math.max(.0001,v*(1-i/5)),t+d*i/5);g.gain.setValueAtTime(.0001,t+d)}function pulse(f,d,du=.5,v=.025,dl=0,b=1,out){if(!S.sound||!AC)return;let t=AC.currentTime+dl,o=AC.createOscillator(),g=AC.createGain();o.setPeriodicWave(pw(du));o.frequency.setValueAtTime(f,t);if(b!=1)o.frequency.exponentialRampToValueAtTime(Math.max(32,f*b),t+d);env(g,t,d,v);o.connect(g).connect(out||AC.destination);o.start(t);o.stop(t+d+.02)}function wave(f,d,v=.018,dl=0,out){if(!S.sound||!AC)return;let sr=AC.sampleRate,L=Math.floor(d*sr),B=AC.createBuffer(1,L,sr),a=B.getChannelData(0),T=[8,10,12,15,12,10,8,6,4,1,4,6,8,12,15,12,8,4,1,4,8,11,14,11,8,5,2,5,8,9,8,7];for(let i=0;i<L;i++)a[i]=((T[Math.floor(((i*f/sr)%1)*32)]-7.5)/7.5)*v;let s=AC.createBufferSource(),g=AC.createGain(),t=AC.currentTime+dl;g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);s.buffer=B;s.connect(g).connect(out||AC.destination);s.start(t)}function noise(d=.06,v=.015,dl=0,out){if(!S.sound||!AC)return;let sr=AC.sampleRate,L=Math.floor(d*sr),B=AC.createBuffer(1,L,sr),a=B.getChannelData(0),l=0x7fff;for(let i=0;i<L;i++){let bit=(l&1)^((l>>1)&1);l=(l>>1)|(bit<<14);a[i]=(l&1?1:-1)*v}let s=AC.createBufferSource(),g=AC.createGain(),t=AC.currentTime+dl;g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);s.buffer=B;s.connect(g).connect(out||AC.destination);s.start(t)}function cry(i=st()){let b=[246,294,330,392,440,494,587,659][i],d=[.125,.25,.5,.25,.75,.5,.25,.125][i];noise(.04,.012,0);pulse(b,.08,d,.028,.01,1.3-i*.03);pul const C=$('cv'),X=C.getContext('2d');let A={x:110,dir:1,fr:0,blink:0};function px(x,y,w,h,c){X.fillStyle=c;X.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}function drawSprite(i,x,y){let sc=3+i*.15,bd=['#f2eadc','#eee3d5','#eee1d2','#efe2d0','#f1e6d8','#f5ecde','#f8f0e7','#fff8ef'][i],ac='#e5b65b',dk='#2a211b',gl='#fff4bc',fr=A.fr;function P(a,b,w=1,h=1,c=bd){px(x+a*sc,y+b*sc,w*sc,h*sc,c)}if(i==0){let w=Math.sin(fr)*1;P(12+w,8,8,12);P(11+w,10,10,8);P(14+w,11,4,1,ac);P(15+w,14,3,1,dk);return}let flap=Math.sin(fr*1.7)>0?1:-1,leg=Math.sin(fr*2)>0?1:-1;if(i>0){P(3,13-flap,4,7,ac);P(0,16-flap,4,4,dk);P(27,13-flap,4,7,ac);P(31,16-flap,4,4,dk)}P(7,23,3,3,ac);P(4,25+flap,4,3,dk);P(10,14,14,10);P(15,18,4,2,gl);P(12,23+(leg>0?1:0),3,7);P(19,23+(leg<0?1:0),3,7);P(13,30,3,1,ac);P(19,30,3,1,ac);P(12,5,12,9);P(14,10,7,3);P(13,3,2,2,ac);P(21,3,2,2,ac);if(i>2){P(10,4,2,3,dk);P(24,4,2,3,dk)}if(i>5){P(16,1,4,1,gl);X.strokeStyle='#fff4bc44';X.beginPath();X.arc(x+17*sc,y+9*sc,13*sc,0,7);X.stroke()}let bl=A.blink>0;P(15,9,2,bl?1:2,'#9b651f');P(20,9,2,bl?1:2,'#9b651f');P(17,13,2,1,dk)}function loop(t){A.fr+=.1;A.blink--;if(A.blink<-100-Math.random()*80)A.blink=5;if(!S.dead){A.x+=A.dir*(.5+stage*.03);if(A.x<70||A.x>345)A.dir*=-1}let g=X.createLinearGradient(0,0,0,240);g.addColorStop(0,'#342318');g.addColorStop(.55,'#19110d');g.addColorStop(1,'#0d0907');X.fillStyle=g;X.fillRect(0,0,416,240);for(let i=0;i<32;i++){X.fillStyle=`rgba(255,235,180,${.25+.25*Math.sin(t/500+i)})`;px((i*37)%416,(i*19)%86,1+(i%2),1)}px(0,176,416,64,'#2a1f18');X.strokeStyle='#ffdf9d33';X.beginPath();X.ellipse(208,186,90,18,0,0,7);X.stroke();X.fillStyle='#0007';X.beginPath();X.ellipse(A.x,188,30+stage*3,8,0,0,7);X.fill();drawSprite(stage,A.x-50,108);requestAnimationFrame(loop)}
function render(){decay();stage=st();let e=EV[stage],n=nxt();$('hero').src=e.img;$('nm').textContent=e.name;$('ds').textContent=e.desc;$('fase').textContent=(stage+1)+'/8';$('ess').textContent=Math.round(S.xp);$('alive').textContent=Math.floor((Date.now()-S.born)/60000)+'m';$('next').textContent=n?n.at:'Final';$('xpStage').textContent='Fase '+(stage+1)+'/8';$('xpText').textContent='Esencia '+Math.round(S.xp);$('xpFill').style.width=n?cl((S.xp-e.at)/(n.at-e.at)*100,0,100)+'%':'100%';$('stats').innerHTML=[['🍎 Hambre','h'],['🧼 Cuidado','c'],['🎾 Diversión','f']].map(([a,k])=>`<div class="stat"><div class="st"><span>${a}</span><span>${Math.round(S[k])}%</span></div><div class="bar"><div class="fill" style="width:${S[k]}%"></div></div></div>`).join('');$('evos').innerHTML=EV.map((v,i)=>`<div class="evo ${i==stage?'current':''} ${i>stage?'locked':''}"><img src="${v.img}"><div>${i>stage?'???':(i+1)+'. '+v.name}</div></div>`).join('');$('sound').textContent=S.sound?'🔊 Sonido':'🔇 Mudo';if(S.dead)$('dead').classList.add('show');save()}
['feed','care','play','rest','bless','heal'].forEach(id=>$(id).onclick=()=>act(id));$('cry').onclick=()=>{unlock();cry();log('🔊 Grito retro de '+EV[stage].name)};$('sound').onclick=()=>{unlock();S.sound=!S.sound;render()};$('reset').onclick=()=>confirm('¿Reiniciar?')&&reset();$('new').onclick=reset;function reset(){let sound=S.sound;S={...DEF,sound,born:Date.now(),tick:Date.now()};$('dead').classList.remove('show');log('🥚 Nueva criatura creada.');render()}window.addEventListener('pointerdown',unlock,{passive:true});assets().then(()=>{render();requestAnimationFrame(loop);setInterval(render,1000)});if('serviceWorker'in navigator&&location.protocol!=='file:')navigator.serviceWorker.register('./sw.js').catch(()=>{});
