transparent 58%);mix-blend-mode:screen}.evoFx.show{animation:pulse 2.7s ease-in-out}@keyframes pulse{0%{opacity:0;filter:blur(1px);transform:scale(.9)}20%{opacity:.72}55%{opacity:1;filter:blur(4px);transform:scale(1.06)}100%{opacity:0;filter:blur(12px);transform:scale(1.25)}}.hud{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:10px}.box{background:#7cf7ff0b;border:1px solid #7cf7ff22;border-radius:14px;padding:9px}.box small{display:block;color:#8fb8c6}.box b{font-size:.95rem}.stat{background:#7cf7ff0a;border:1px solid #7cf7ff1e;border-radius:15px;padding:10px;margin-top:10px}.st{display:flex;justify-content:space-between;color:#eaffff;font-size:.9rem;margin-bottom:7px}.bar{height:14px;background:#020507;border-radius:99px;overflow:hidden}.fill{height:100%;background:linear-gradient(90deg,#ff5b8a,#ffd86b,#7cf7ff,#79ffd8);width:50%;transition:.25s}.xp{margin-top:12px;background:#7cf7ff12;border:1px solid #7cf7ff30;border-radius:17px;padding:12px}.xpTop{display:flex;justify-content:space-between;margin-bottom:8px}.xpbar{height:10px;border-radius:99px;overflow:hidden;background:#0007}.xpfill{height:100%;width:0;background:linear-gradient(90deg,#8b7dff,#7cf7ff,#fff)}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:12px}.actions button{border:1px solid #7cf7ff36;color:#f2ffff;border-radius:15px;padding:12px 8px;font-weight:900;background:linear-gradient(#12374a,#09111b)}.log{margin-top:12px;min-height:60px;padding:10px;border:1px solid #7cf7ff22;border-radius:15px;background:#0004;color:#c5eff7;font-size:.9rem}.evos{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px}.evo{padding:10px 8px 12px;text-align:center;border-radius:16px;background:#7cf7ff0b;border:1px solid #7cf7ff24;color:#9cc9d8;font-size:.72rem;min-height:176px;display:flex;flex-direction:column;align-items:center}.evo.current{outline:2px solid #7cf7ff88;color:#fff;background:#7cf7ff20}.evo.locked svg{filter:brightness(0) contras </style></head><body><main class="app"><div class="top"><div class="title"><span>CyberNexo Prisma</span> // 6 fases</div><div><button id="sound">🔊 Audio</button><button id="reset">Reset</button></div></div><section class="sec"><div class="card"><div class="art"><svg id="hero" viewBox="0 0 600 600"></svg></div><div class="meta"><div class="name" id="nm"></div><div class="desc" id="ds"></div></div></div></section><section class="sec"><div class="gameTitle">Simulación de campo <button class="mini" id="cry">Pulso</button></div><div class="wrap"><canvas id="cv" width="416" height="240"></canvas><div class="flash" id="flash"></div><div class="evoFx" id="evoFx"></div></div><div class="hud"><div class="box"><small>Fase</small><b id="fase">1/6</b></div><div class="box"><small>Datos núcleo</small><b id="ess">0</b></div><div class="box"><small>Online</small><b id="alive">0m</b></div><div class="box"><small>Próxima forma</small><b id="next">220</b></div></div></section><section class="sec"><div id="stats"></div><div class="xp"><div class="xpTop"><span id="xpStage">Fase 1/6</span><span id="xpText">0</span></div><div class="xpbar"><div class="xpfill" id="xpFill"></div></div></div><div class="actions"><button id="feed">Energizar</button><button id="care">Mantener</button><button id="play">Entrenar</button><button id="rest">Suspender</button><button id="bless">Impulso</button><button id="heal">Restaurar</button></div><div class="log" id="log">Toca la pantalla para activar audio. Música gótica PSOne procedural y transición azul al evolucionar.</div><div class="evos" id="evos"></div></section></main><div class="overlay" id="dead"><div class="modal"><h2>Fallo del nexo</h2><p id="why"></p><button id="new">Reiniciar nexo</button></div></div><script>
const EV=[['Núcleo Semilla',0,'El kernel despierta jugando con datos flotantes.'],['Bytecría',220,'Primera forma móvil, curiosa y luminosa.'],['Lynx de Paquetes',520,'Cazador joven de datos y señales.'],['Protocazador',980,'Forma ágil optimizada para nodos hostiles.'],['Centinela Kernel',2100,'Blindaje noble y control defensivo del campo.'],['Soberano Nexo',4200,'Forma final, dramática e imposible de corromper.']].map((e,i)=>({name:e[0],at:e[1],desc:e[2],i}));
const K='cybernexo_prisma_repo_v1',DEF={h:78,c:75,f:74,xp:0,born:Date.now(),tick:Date.now(),dead:false,sound:true,bu:0,hu:0};let S=load(),AC=null,ready=false,stage=0,vis=null,transition=false,bgmTimer=null,bgmGain=null,actor={x:110,dir:1,mode:'walk',tm:3000,anim:0,last:0};const $=id=>document.getElementById(id),cl=(n,a,b)=>Math.max(a,Math.min(b,n));function load(){try{return{...DEF,...JSON.parse(localStorage[K]||'{}')}}catch{return{...DEF}}}function save(){localStorage[K]=JSON.stringify(S)}function st(){let i=0;EV.forEach((e,n)=>{if(S.xp>=e.at)i=n});return i}function nxt(){return EV[st()+1]}function log(t){$('log').textContent=t}function flash(t){let f=$('flash');f.textContent=t;f.classList.add('show');clearTimeout(f.t);f.t=setTimeout(()=>f.classList.remove('show'),1000)}function svgArt(i,locked=false){let c=['#7cf7ff','#8b7dff','#57e6c9','#ffd86b','#ff8ab1','#ffffff'][i],dark='#07111c',r=60+i*18,act=['jugando','explorando','acechando','saltando','defendiendo','atacando'][i];return `<svg viewBox="0 0 300 300"><defs><radialGradient id="g${i}"><stop offset="0" stop-color="${c}"/><stop offset="1" stop-color="#06101c"/></radialGradient></defs><rect width="300" height="300" rx="22" fill="${dark}"/><circle cx="150" cy="140" r="${r+35}" fill="url(#g${i})" opacity=".18"/><path d="M80 ${190-i*4} Q150 ${95-i*8} 220 ${190-i*4} Q150 ${230-i*4} 80 ${190-i*4}Z" fill="#111b2a" stroke="${c}" stroke-width="5"/><circle cx="125" cy="165" r="8" fill="${c}"/><circle cx="174" cy="165" r="8" fill="${c}"/><path d="M205 ${185-i*5} q${30+i*8} ${-35-i*6} ${58+i*4} 8" fill="none" stroke="${c}" stroke-width="7" stroke-linecap="round"/><circle cx="${245+i*5}" cy="${190-i*10}" r="${9+i}" fill="${c}" opacity=".9"/><path d="M92 ${120-i*5} l${-16-i*4} ${-28-i*2} M208 ${120-i*5} l${16+i*4} ${-28-i*2}" stroke="${c}" stroke-width="6" stroke-linecap="round"/><text x="150" y="270" fill="#dff" font-size="20" text-anchor="middle" font-family="system-ui">${locked?'???':act}</text></svg>`}function renderHero function die(t){if(S.dead)return;S.dead=true;$('why').textContent=t;$('dead').classList.add('show');fxDeath();stopBgm();save()}function check(){if(S.h<=0)die('Energía llegó a 0.');else if(S.c<=0)die('Integridad llegó a 0.');else if(S.f<=0)die('Sincronía llegó a 0.')}function decay(){if(S.dead)return;let n=Math.floor((Date.now()-S.tick)/8000);if(n<=0)return;for(let i=0;i<n;i++){let q=st();S.h=cl(S.h-(1.65+q*.14),0,100);S.c=cl(S.c-(1.35+q*.12),0,100);S.f=cl(S.f-(1.48+q*.13),0,100);check();if(S.dead)break}S.tick+=n*8000}function mult(){let avg=(S.h+S.c+S.f)/3,spread=Math.max(S.h,S.c,S.f)-Math.min(S.h,S.c,S.f);let m=avg>=80?1.7:avg>=68?1.25:avg>=55?.95:avg>=42?.72:.4;if(spread<=12)m+=.3;else if(spread<=22)m+=.14;return m}function xp(n,msg){let b=st(),g=Math.max(1,Math.round(n*mult()));S.xp+=g;let a=st();if(a>b)evolve(b,a,g);else log(msg+' +'+g+' datos.')}function act(t){unlock();if(transition)return log('Transformación en curso...');decay();if(S.dead)return render();if(t=='feed'){S.h=cl(S.h+18,0,100);S.f=cl(S.f-3,0,100);xp(12,'⚡ Energía recargada.');fx(520)}if(t=='care'){S.c=cl(S.c+19,0,100);S.h=cl(S.h-2,0,100);xp(11,'🛡️ Integridad reparada.');fx(660)}if(t=='play'){S.f=cl(S.f+21,0,100);S.h=cl(S.h-7,0,100);S.c=cl(S.c-4,0,100);xp(13,'◈ Entrenamiento ejecutado.');fx(780)}if(t=='rest'){S.c=cl(S.c+8,0,100);S.f=cl(S.f+5,0,100);S.h=cl(S.h-6,0,100);xp(6,'☾ Suspensión estable.');fx(330)}if(t=='bless'){if(Date.now()<S.bu)return log('Impulso recargando.');S.h=cl(S.h+10,0,100);S.c=cl(S.c+10,0,100);S.f=cl(S.f+10,0,100);S.bu=Date.now()+240000;xp(15,'⬡ Impulso aplicado.');fx(1040)}if(t=='heal'){if(Date.now()<S.hu)return log('Restauración recargando.');S.h=cl(S.h+16,0,100);S.c=cl(S.c+16,0,100);S.f=cl(S.f+16,0,100);S.hu=Date.now()+420000;xp(5,'✚ Restauración aplicada.');fx(440)}check();S.tick=Date.now();render()}
function unlock(){if(ready)return;try{AC=new(window.AudioContext||window.webkitAudioContext)();ready=true;startBgm()}catch{}}function tone(f,d,type='sine',v=.05,delay=0,b=1,out){if(!S.sound||!AC)return;let t=AC.currentTime+delay,o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.setValueAtTime(f,t);if(b!=1)o.frequency.exponentialRampToValueAtTime(Math.max(32,f*b),t+d);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(v,t+.01);g.gain.exponentialRampToValueAtTime(.0001,t+d);o.connect(g).connect(out||AC.destination);o.start(t);o.stop(t+d+.03)}function noise(d=.1,v=.035,delay=0,out){if(!S.sound||!AC)return;let sr=AC.sampleRate,L=Math.floor(d*sr),B=AC.createBuffer(1,L,sr),a=B.getChannelData(0);for(let i=0;i<L;i++)a[i]=(Math.random()*2-1)*v;let s=AC.createBufferSource(),g=AC.createGain(),t=AC.currentTime+delay;g.gain.setValueAtTime(1,t);g.gain.exponentialRampToValueAtTime(.0001,t+d);s.buffer=B;s.connect(g).connect(out||AC.destination);s.start(t)}function fx(f){tone(f,.08,'triangle',.035);tone(f*1.5,.11,'sine',.025,.06)}function fxDeath(){tone(180,.3,'sawtooth',.06,0,.5);noise(.32,.06,.05)}function explosion(){tone(82,.35,'sawtooth',.08,0,.45);tone(164,.18,'triangle',.06,.05,1.6);tone(328,.22,'square',.035,.12,.55);[520,690,880,1160,1520].forEach((f,i)=>tone(f,.09,'triangle',.025,.18+i*.055,1.35));noise(.35,.075,.02);noise(.18,.045,.30)}function cry(i=stage){let b=[220,294,349,440,523,659][i];noise(.04,.03);tone(b,.09,'square',.055,.02,1.35);tone(b*1.28,.08,'triangle',.04,.11,.7);tone(b*.5,.16,'sine',.03,.20,1.1)}function stopBgm(){if(bgmTimer)clearInterval(bgmTimer);bgmTimer=null;if(bgmGain){bgmGain.gain.cancelScheduledValues(AC.currentTime);bgmGain.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+.8)}}function startBgm(){if(!AC||!S.sound)return;stopBgm();bgmGain=AC.createGain();bgmGain.gain.value=.0001;bgmGain.connect(AC.destination);bgmGain.gain.exponentialRampToValueAtTime(.22,AC.currentTime+1);let ph=stage,step=0,bpm=[84,92,106,118,112,124][ph],beat=60/bpm,roots=[57,60,55,50,47,43],motifs=[[0,2,3,5,7,5,3,2,0,3,5,7,8,7,5,null],[0,3,5,7,9,7,5,3,2,5,7,10,9,7,5,null],[7,5,3,2,3,5,7,10,8,7,5,3,5,7,8,null],[0,1,3,5,7,8,7,5,3,5,7,11,8,7,5,null],[0,3,7,8,11,8,7,5,3,5,7,12,11,8,7,null],[12,11,8,7,5,7,8,11,12,14,15,14,12,11,8,null]];let mode=[[0,2,3,5,7,8,10],[0,2,3,5,7,9,10],[0,2,3,5,7,8,10],[0,2,3,5,7,8,11],[0,1,3,5,7,8,10],[0,2,3,5,7,8,11]][ph],prog=[[0,3,5,4],[0,5,3,4],[0,4,5,2],[0,1,5,4],[0,5,6,1],[0,6,5,1]][ph];function tick(){let cr=roots[ph]+mode[prog[Math.floor(step/16)%4]%mode.length],m=motifs[ph][step%16];if(step%4==0){tone(55*Math.pow(2,(cr-45)/12),beat*.9,ph>3?'sawtooth':'sine',.035,0,1,bgmGain);tone(110*Math.pow(2,(cr-45)/12),beat*2,ph>3?'triangle':'sine',.018,0,1,bgmGain)}if(step%2==0){let arp=[0,7,12,7,0,7,12,15][step%8];tone(midi(cr+arp),beat*.32,'square',.015,0,1,bgmGain)}if(m!==null){tone(midi(cr+12+m),beat*.38,ph<2?'sine':ph<4?'square':'sawtooth',.028+ph*.004,0,1,bgmGain)}if(ph>0&&step%4==0)tone(70,beat*.12,'sine',.035,0,.55,bgmGain);if(ph>1&&step%4==2)noise(beat*.08,.018,0,bgmGain);if(ph>3&&step%2==1)noise(beat*.035,.008,0,bgmGain);step++}tick();bgmTimer=setInterval(tick,beat*500)}function midi(m){return 440*Math.pow(2,(m-69)/12)}function evolve(from,to,g){transition=true;vis=from;stopBgm();explosion();flash('TRANSFORMACIÓN');$('evoFx').classList.remove('show');void $('evoFx').offsetWidth;$('evoFx').classList.add('show');log('⬡ Reescritura digital iniciada...');render();setTimeout(()=>{vis=to;stage=to;actor.anim=0;actor.mode='idle';cry(to);log('⬡ Evolución compilada: '+EV[to].name+' (+'+g+' datos).');render()},1450);setTimeout(()=>{transition=false;vis=null;$('evoFx').classList.remove('show');render();startBgm()},2850)}
const cv=$('cv'),ctx=cv.getContext('2d');ctx.imageSmoothingEnabled=false;function bg(ts){let w=cv.width,h=cv.height,g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#071b25');g.addColorStop(.55,'#030b10');g.addColorStop(1,'#000204');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.strokeStyle='rgba(124,247,255,.08)';for(let x=0;x<w;x+=26){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}for(let y=0;y<h;y+=26){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}ctx.strokeStyle='rgba(124,247,255,.25)';ctx.beginPath();ctx.ellipse(208,184,96,18,0,0,Math.PI*2);ctx.stroke()}function drawPet(ts){let i=stage,ground=188,dt=actor.last?Math.min((ts-actor.last)/1000,.05):1/60;actor.last=ts;actor.anim+=dt;if(!S.dead&&!transition){actor.tm-=dt*1000;if(i&&actor.mode=='walk'){actor.x+=actor.dir*(18+i*2)*dt;if(actor.x<80){actor.x=80;actor.dir=1;actor.mode='idle';actor.tm=1400}if(actor.x>330){actor.x=330;actor.dir=-1;actor.mode='idle';actor.tm=1400}if(actor.tm<=0){actor.mode='idle';actor.tm=1200+Math.random()*1200}}else if(actor.tm<=0){actor.mode='walk';actor.tm=2600+Math.random()*1600;if(Math.random()<.4)actor.dir*=-1}}let bob=Math.sin(actor.anim*(i?5:3))*(i?1.5:3),scale=.55+i*.11,c=['#7cf7ff','#8b7dff','#57e6c9','#ffd86b','#ff8ab1','#fff'][i];ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(actor.x,ground+2,30+i*7,7+i*.5,0,0,7);ctx.fill();ctx.save();ctx.translate(actor.x,ground+bob);ctx.scale(actor.dir,1);ctx.lineWidth=3;ctx.strokeStyle=c;ctx.fillStyle='#101b2a';ctx.beginPath();ctx.ellipse(0,-45*scale,48*scale,34*scale,0,0,7);ctx.fill();ctx.stroke();ctx.beginPath();ctx.moveTo(36*scale,-46*scale);ctx.quadraticCurveTo((75+i*7)*scale,(-80-i*4)*scale,(100+i*8)*scale,(-36-i*3)*scale);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.arc((103+i*8)*scale,(-36-i*3)*scale,7+i,0,7);ctx.fill();ctx.beginPath();ctx.moveTo(-25*scale,-74*scale);ctx.lineTo((-36-i*4)*scale,(-100-i*4)*scale);ctx.moveTo(25*scale,-74*scale);ctx.lineTo((36+i*4)*scale,(-100+i*-4)*scale);ctx.stroke();ctx.fillStyle=c;ctx.beginPath();ctx.arc(-16*scale,-48*scale,5,0,7);ctx.arc(16*scale,-48*scale,5,0,7);ctx.fill();for(let k=-2;k<=2;k++){ctx.fillRect(k*9*scale,-18*scale,4,4)}ctx.restore()}function loop(ts){bg(ts);drawPet(ts);requestAnimationFrame(loop)}function render(){decay();stage=vis!==null?vis:st();let e=EV[stage],n=nxt();$('fase').textContent=stage+1+'/'+EV.length;$('ess').textContent=Math.round(S.xp);$('alive').textContent=Math.floor((Date.now()-S.born)/60000)+'m';$('next').textContent=n?n.at:'Final';$('nm').textContent=e.name;$('ds').textContent=e.desc;renderHero();$('xpStage').textContent='Fase '+(stage+1)+'/'+EV.length;$('xpText').textContent=Math.round(S.xp)+' datos';$('xpFill').style.width=n?cl((S.xp-e.at)/(n.at-e.at)*100,0,100)+'%':'100%';$('stats').innerHTML=[['⚡ Energía','h'],['🛡️ Integridad','c'],['◈ Sincronía','f']].map(([l,k])=>`<div class="stat"><div class="st"><span>${l}</span><span>${Math.round(S[k])}%</span></div><div class="bar"><div class="fill" style="width:${S[k]}%"></div></div></div>`).join('');$('dead').classList.toggle('show',S.dead);$('evos').innerHTML=EV.map((v,i)=>{let locked=i>stage;return `<div class="evo ${i==stage?'current':''} ${locked?'locked':''}">${svgArt(i,locked)}<span class="evo-num">${i+1}/${EV.length}</span><span class="evo-title">${locked?'???':v.name}</span></div>`}).join('');$('sound').textContent=S.sound?'🔊 Audio':'🔇 Audio';save()}function reset(){let sound=S.sound;S={...DEF,sound,born:Date.now(),tick:Date.now()};actor.x=110;actor.dir=1;actor.mode='walk';actor.tm=3000;$('dead').classList.remove('show');startBgm();log('⬡ Ruta Prisma inicializada.');render()}['feed','care','play','rest','bless','heal'].forEach(id=>$(id).onclick=()=>act(id));$('cry').onclick=()=>{unlock();cry();log('🔊 Pulso digital emitido por '+EV[stage].name+'.')};$('sound').onclick=()=>{unlock();S.sound=!S.sound;if(S.sound)startBgm();else stopBgm();render()};$('reset').onclick=()=>confirm('¿Reiniciar progreso?')&&reset();$('new').onclick=reset;window.addEventListener('pointerdown',unlock,{passive:true});render();requestAnimationFrame(loop);setInterval(render,1000);if('serviceWorker'in navigator&&location.protocol!='file:')navigator.serviceWorker.register('./sw.js').catch(()=>{});
