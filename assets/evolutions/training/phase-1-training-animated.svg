    <path d="M71 59c27-28 66-29 95-17" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" opacity=".23"/>
    <g class="arc" filter="url(#glow)" stroke="#00f4ff" stroke-width="3" fill="none" stroke-linecap="round">
